{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Регистрация</title>
    <link rel="stylesheet" href="{% static 'css/registration.css' %}">
</head>
<body class="auth-page">
    <div class="content">
        <h1>Регистрация</h1>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Логин" value="{{ form.username }}">
            {% if form.errors.username %}
                <div class="error">{{ form.errors.username }}</div>
            {% endif %}
            {% if form.errors.username_exists %}
                <div class="error">{{ form.errors.username_exists }}</div>
            {% endif %}

            <input type="email" name="email" placeholder="Email" value="{{ form.email }}">

            <input type="password" name="password" placeholder="Пароль">
            {% if form.errors.password %}
                <div class="error">{{ form.errors.password }}</div>
            {% endif %}

            <input type="submit" value="Зарегистрироваться">
        </form>
    </div>
</body>
</html>
